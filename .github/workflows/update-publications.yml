name: Update Publications

on:
  schedule:
    - cron: "0 3 * * 1"  # lunes 3am
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install

      - name: Fetch publications
        run: npm run fetch:pubs

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add src/data/publications.json

          git diff --cached --quiet || git commit -m "Update publications"

          git push